<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Adventure Timing">
  <title>Adventure Timing</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1a2e"/>
      <stop offset="0.55" stop-color="#0e2d44"/>
      <stop offset="1" stop-color="#123b52"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f6e8b0"/>
      <stop offset="0.65" stop-color="#e6c76a"/>
      <stop offset="1" stop-color="#8a6420" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a2136"/>
      <stop offset="1" stop-color="#04101c"/>
    </linearGradient>
    <linearGradient id="platform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3aa79a"/>
      <stop offset="1" stop-color="#1a5f6a"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ff5ff"/>
      <stop offset="1" stop-color="#22b4c8"/>
    </linearGradient>
    <clipPath id="frame">
      <rect x="16" y="16" width="480" height="480" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#sky)"/>

  <g clip-path="url(#frame)">
    <g fill="#f4f2c0" opacity="0.9">
      <circle cx="80"  cy="90"  r="1.8"/>
      <circle cx="140" cy="60"  r="1.2"/>
      <circle cx="210" cy="110" r="1.6"/>
      <circle cx="300" cy="70"  r="2.2"/>
      <circle cx="360" cy="130" r="1.4"/>
      <circle cx="420" cy="90"  r="1.8"/>
      <circle cx="460" cy="170" r="1.2"/>
      <circle cx="60"  cy="200" r="1.4"/>
      <circle cx="180" cy="220" r="1.1"/>
      <circle cx="270" cy="170" r="1.3"/>
    </g>

    <circle cx="380" cy="120" r="48" fill="url(#moon)"/>
    <circle cx="366" cy="110" r="44" fill="#0e2d44"/>

    <path d="M -20,340 L 60,240 L 140,320 L 210,220 L 290,300 L 360,230 L 440,310 L 540,260 L 540,520 L -20,520 Z"
          fill="url(#mountain)"/>
    <path d="M -20,380 L 70,300 L 150,360 L 240,290 L 320,360 L 400,300 L 480,360 L 540,320 L 540,520 L -20,520 Z"
          fill="#061625" opacity="0.85"/>

    <g fill="#02090f" opacity="0.7">
      <path d="M 40,420 L 60,360 L 66,362 L 72,352 L 78,362 L 82,358 L 90,420 Z"/>
      <path d="M 100,430 L 118,378 L 124,382 L 132,368 L 140,380 L 148,376 L 154,430 Z"/>
      <path d="M 430,430 L 446,376 L 452,380 L 462,366 L 470,380 L 478,378 L 484,430 Z"/>
    </g>

    <g transform="translate(228 260)">
      <rect x="-72" y="0" width="144" height="26" rx="4" fill="url(#platform)"/>
      <rect x="-72" y="24" width="144" height="10" fill="#0d3a44"/>
      <rect x="-68" y="4"  width="20" height="4" fill="#7fd6c8" opacity="0.6"/>
      <rect x="-40" y="4"  width="12" height="4" fill="#7fd6c8" opacity="0.6"/>
      <rect x="24"  y="4"  width="28" height="4" fill="#7fd6c8" opacity="0.6"/>
    </g>

    <g transform="translate(256 258)">
      <path d="M -22,-4 C -30,-24 -18,-58 0,-72 C 18,-58 30,-24 22,-4 L 22,10 L -22,10 Z"
            fill="#0a0f18"/>
      <path d="M -18,-6 C -22,-22 -12,-46 0,-56 C 12,-46 22,-22 18,-6 L 12,-6 L -12,-6 Z"
            fill="#152238"/>
      <ellipse cx="0" cy="-38" rx="8" ry="10" fill="#0a0f18"/>
      <circle cx="-3" cy="-40" r="1.4" fill="#7fd6c8"/>
      <circle cx="4"  cy="-40" r="1.4" fill="#7fd6c8"/>
      <rect x="-20" y="10" width="40" height="14" rx="3" fill="#0a0f18"/>
      <rect x="-14" y="24" width="10" height="16" fill="#0a0f18"/>
      <rect x="4"   y="24" width="10" height="16" fill="#0a0f18"/>
    </g>

    <g transform="translate(120 300)">
      <path d="M 0,-40 L 12,-8 L 6,20 L -6,20 L -12,-8 Z" fill="url(#crystal)"/>
      <path d="M 0,-40 L 12,-8 L 0,-4 Z" fill="#c9fbff" opacity="0.7"/>
      <circle cx="0" cy="-6" r="26" fill="#8ff5ff" opacity="0.12"/>
    </g>

    <g transform="translate(410 268)">
      <rect x="-1.5" y="-70" width="3" height="90" fill="#4a2a10"/>
      <path d="M 1.5,-70 L 32,-58 L 1.5,-46 Z" fill="#ffb84c"/>
      <path d="M 1.5,-70 L 32,-58 L 1.5,-58 Z" fill="#ffd58a"/>
    </g>
  </g>

  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="none" stroke="#7fd6c8" stroke-opacity="0.35" stroke-width="4"/>
</svg>
