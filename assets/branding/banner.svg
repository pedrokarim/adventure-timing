<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Adventure Timing">
  <title>Adventure Timing</title>
  <defs>
    <linearGradient id="bgSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1a2e"/>
      <stop offset="0.55" stop-color="#0e2d44"/>
      <stop offset="1" stop-color="#154256"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6efc0"/>
      <stop offset="1" stop-color="#e6c76a"/>
    </linearGradient>
    <linearGradient id="mt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a2136"/>
      <stop offset="1" stop-color="#04101c"/>
    </linearGradient>
    <linearGradient id="plat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3aa79a"/>
      <stop offset="1" stop-color="#1a5f6a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8ff5ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8ff5ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect x="0" y="0" width="1280" height="320" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <rect width="1280" height="320" fill="url(#bgSky)"/>

  <g clip-path="url(#clip)">
    <g fill="#f4f2c0" opacity="0.85">
      <circle cx="80"   cy="60"  r="1.6"/>
      <circle cx="180"  cy="30"  r="1.2"/>
      <circle cx="260"  cy="80"  r="1.8"/>
      <circle cx="380"  cy="40"  r="1.4"/>
      <circle cx="470"  cy="90"  r="1.6"/>
      <circle cx="560"  cy="55"  r="1.2"/>
      <circle cx="640"  cy="85"  r="2"/>
      <circle cx="740"  cy="45"  r="1.5"/>
      <circle cx="830"  cy="70"  r="1.3"/>
      <circle cx="940"  cy="35"  r="1.7"/>
      <circle cx="1030" cy="80"  r="1.2"/>
      <circle cx="1130" cy="55"  r="1.5"/>
      <circle cx="1210" cy="90"  r="1.4"/>
    </g>

    <circle cx="1090" cy="90" r="40" fill="#f6e8b0" opacity="0.85"/>
    <circle cx="1078" cy="82" r="38" fill="#0e2d44"/>

    <path d="M -20,240 L 120,140 L 240,220 L 380,120 L 520,220 L 660,150 L 800,230 L 940,140 L 1080,220 L 1200,160 L 1320,240 L 1320,340 L -20,340 Z"
          fill="url(#mt)"/>
    <path d="M -20,280 L 110,200 L 240,260 L 360,200 L 500,270 L 640,210 L 780,270 L 900,220 L 1040,270 L 1180,220 L 1320,270 L 1320,340 L -20,340 Z"
          fill="#061625" opacity="0.8"/>

    <g transform="translate(180 200)">
      <ellipse cx="0" cy="80" rx="180" ry="24" fill="url(#glow)"/>
      <g transform="translate(-60 0)">
        <rect x="-72" y="0" width="144" height="24" rx="4" fill="url(#plat)"/>
        <rect x="-72" y="22" width="144" height="10" fill="#0d3a44"/>
        <rect x="-68" y="4" width="18" height="4" fill="#7fd6c8" opacity="0.55"/>
        <rect x="10"  y="4" width="26" height="4" fill="#7fd6c8" opacity="0.55"/>
      </g>
      <g transform="translate(-60 -2)">
        <path d="M -20,-4 C -28,-24 -16,-56 0,-70 C 16,-56 28,-24 20,-4 L 20,10 L -20,10 Z"
              fill="#0a0f18"/>
        <path d="M -16,-6 C -20,-22 -10,-44 0,-54 C 10,-44 20,-22 16,-6 L 10,-6 L -10,-6 Z"
              fill="#152238"/>
        <ellipse cx="0" cy="-38" rx="7" ry="9" fill="#0a0f18"/>
        <circle cx="-3" cy="-40" r="1.3" fill="#7fd6c8"/>
        <circle cx="3"  cy="-40" r="1.3" fill="#7fd6c8"/>
        <rect x="-18" y="10" width="36" height="12" rx="3" fill="#0a0f18"/>
        <rect x="-13" y="22" width="8" height="14" fill="#0a0f18"/>
        <rect x="5"   y="22" width="8" height="14" fill="#0a0f18"/>
      </g>
      <g transform="translate(80 -6)">
        <path d="M 0,-38 L 10,-8 L 5,18 L -5,18 L -10,-8 Z" fill="#8ff5ff"/>
        <path d="M 0,-38 L 10,-8 L 0,-4 Z" fill="#c9fbff" opacity="0.75"/>
      </g>
    </g>

    <g transform="translate(560 160)" font-family="'Georgia', 'Times New Roman', serif" font-weight="700">
      <text x="0" y="0" font-size="88" fill="url(#text)" letter-spacing="4">ADVENTURE</text>
      <text x="0" y="84" font-size="88" fill="url(#text)" letter-spacing="4">TIMING</text>
      <text x="4" y="120" font-size="18" fill="#7fd6c8" letter-spacing="10" font-family="'Courier New', monospace" font-weight="400">
        A MYSTIC NIGHT PLATFORMER
      </text>
    </g>
  </g>

  <rect x="1" y="1" width="1278" height="318" rx="24" ry="24"
        fill="none" stroke="#7fd6c8" stroke-opacity="0.3" stroke-width="2"/>
</svg>
