# Linker rapide pour accélérer les rebuilds (Bevy = gros graphe de symboles).
#
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# macOS : décommenter pour utiliser lld via Homebrew (brew install llvm)
# [target.x86_64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/usr/local/opt/llvm/bin/ld64.lld"]
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]

# Windows : décommenter pour utiliser lld (rustup component add llvm-tools-preview)
# [target.x86_64-pc-windows-msvc]
# linker = "rust-lld.exe"
